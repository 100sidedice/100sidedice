<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100sidedice homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="profilepic.png">

</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="module" src="script.js"></script>

    <div class="header">
        <a class="profile-link tilt" href="">
            <img class="profile-img" src="profilepic.png" alt="Profile">
        </a>
        <h1>100sidedice</h1>
    </div>
    <div id="link_zone">
        <div class="linkbox tilt"><a href="https://github.com/100sidedice" target="_blank" rel="noopener">Github</a></div>
        <div class="linkbox tilt"><a href="/README.md">Readme</a></div>
        <div class="linkbox tilt" id="docs-link">Docs</div>
        <div class="linkbox tilt" id="about-link">About</div>
        <div class="linkbox tilt" id="play-link">Play</div>
    </div>
    <div id="items"></div>
    <!-- Shop modal (hidden until an item is clicked) -->
    <div id="shop-modal" class="hidden" aria-hidden="true">
        <div class="shop-dialog" role="dialog" aria-modal="true" aria-labelledby="shop-title">
            <button id="shop-close" class="shop-close" aria-label="Close shop">×</button>
            <h2 id="shop-title">Shop</h2>
            <div id="shop-content"></div>
        </div>
    </div>

    <div id="mainBoard">
        
    </div>
</body>
</html>
